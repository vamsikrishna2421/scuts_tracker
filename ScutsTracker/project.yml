# XcodeGen spec — fallback way to (re)generate ScutsTracker.xcodeproj.
#   brew install xcodegen && xcodegen generate
# The repository already ships a ready-to-open .xcodeproj; use this only if it drifts.
name: ScutsTracker
options:
  bundleIdPrefix: com.scuts
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
targets:
  ScutsTracker:
    type: application
    platform: iOS
    sources:
      - path: ScutsTracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.scuts.tracker
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: "Scuts Tracker"
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Scuts Tracker uses the microphone so you can log updates to salon owners by voice."
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "Scuts Tracker transcribes your voice notes into text so the assistant can summarize them."
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_PREVIEWS: "YES"
