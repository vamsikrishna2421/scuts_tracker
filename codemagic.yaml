# Cloud iOS/Android builds for Scuts Tracker — mirrors the Lucy pipeline.
# iOS builds run on a Codemagic macOS instance, so no local Mac is required.
# Trigger manually from the Codemagic dashboard after connecting this GitHub repo.
workflows:
  ios-testflight:
    name: Scuts Tracker — iOS TestFlight
    max_build_duration: 90
    instance_type: mac_mini_m2

    environment:
      node: latest
      xcode: latest
      cocoapods: default
      groups:
        - ios-creds   # Codemagic variable group: App Store Connect API key + signing (reuse the one you made for Lucy)
      vars:
        BUNDLE_ID: com.scuts.tracker
        XCODE_SCHEME: scutstracker

    triggering:
      events: []   # manual builds only — start from the Codemagic dashboard

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Auto-increment build number BEFORE prebuild
        script: |
          # Expo bakes CFBundleVersion into the Xcode project during `expo prebuild`,
          # so the build number must be set in app.json first. Codemagic's monotonic
          # $BUILD_NUMBER + 100 keeps it growing and avoids "build number already used".
          NUM=$(( ${BUILD_NUMBER:-1} + 100 ))
          BUILD_NUM="1.0.$NUM"
          node -e "const fs=require('fs');const a=JSON.parse(fs.readFileSync('app.json','utf8'));a.expo.ios=a.expo.ios||{};a.expo.android=a.expo.android||{};a.expo.ios.buildNumber='$BUILD_NUM';a.expo.android.versionCode=$NUM;fs.writeFileSync('app.json',JSON.stringify(a,null,2));console.log('iOS buildNumber=',a.expo.ios.buildNumber,'| android versionCode=',a.expo.android.versionCode);"

      - name: Expo prebuild (generate native iOS project)
        script: npx expo prebuild --platform ios --non-interactive

      - name: Install Pods
        script: |
          cd ios
          pod install --repo-update

      - name: Set up keychain
        script: keychain initialize

      - name: Fetch or create App Store signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create

      - name: Add certificates to keychain
        script: keychain add-certificates

      - name: Apply signing profiles to Xcode project
        script: xcode-project use-profiles

      - name: Build IPA
        script: |
          WORKSPACE=$(find ios -name "*.xcworkspace" -maxdepth 1 | head -1)
          SCHEME=$(find ios -name "*.xcodeproj" -maxdepth 1 | head -1 | xargs basename | sed 's/.xcodeproj//')
          echo "Using workspace: $WORKSPACE"
          echo "Using scheme: $SCHEME"
          xcode-project build-ipa \
            --workspace "$WORKSPACE" \
            --scheme "$SCHEME" \
            --config Release

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
      email:
        recipients:
          - vamsy.24@gmail.com
        notify:
          success: true
          failure: true

  android-apk:
    name: Scuts Tracker — Android APK
    max_build_duration: 90
    instance_type: mac_mini_m2

    environment:
      node: latest
      java: 17
      vars:
        PACKAGE_NAME: com.scuts.tracker

    triggering:
      events: []

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Auto-increment versionCode BEFORE prebuild
        script: |
          NUM=$(( ${BUILD_NUMBER:-1} + 100 ))
          node -e "const fs=require('fs');const a=JSON.parse(fs.readFileSync('app.json','utf8'));a.expo.android=a.expo.android||{};a.expo.android.versionCode=$NUM;fs.writeFileSync('app.json',JSON.stringify(a,null,2));console.log('android versionCode=',a.expo.android.versionCode);"

      - name: Expo prebuild (generate native Android project)
        script: npx expo prebuild --platform android --non-interactive

      - name: Build release APK
        script: |
          cd android
          ./gradlew assembleRelease --no-daemon

    artifacts:
      - android/app/build/outputs/**/*.apk

    publishing:
      email:
        recipients:
          - vamsy.24@gmail.com
        notify:
          success: true
          failure: true
